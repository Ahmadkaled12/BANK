<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:60px">

<h2>إنشاء حساب جديد 🟢</h2>

<input id="username" placeholder="اسم المستخدم"><br><br>
<input id="email" placeholder="البريد الإلكتروني"><br><br>
<input id="password" type="password" placeholder="كلمة المرور"><br><br>

<button onclick="register()">إنشاء الحساب</button>

<p id="msg"></p>

<script>
function register(){

let username = document.getElementById("username").value.trim();
let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();

let msg = document.getElementById("msg");

// 🔴 تحقق من الإدخال
if(!username || !email || !password){
msg.innerText = "⚠️ يرجى ملء جميع الحقول";
return;
}

// 🔵 جلب المستخدمين
let users = JSON.parse(localStorage.getItem("users")) || [];

// 🔴 منع تكرار الاسم
let exists = users.find(u => u.username === username);

if(exists){
msg.innerText = "❌ اسم المستخدم موجود مسبقًا";
return;
}

// 🟢 إنشاء المستخدم
let newUser = {
username: username,
email: email,
password: password,
balance: 1000
};

users.push(newUser);

// 🟢 حفظ آمن
localStorage.setItem("users", JSON.stringify(users));

msg.innerText = "✅ تم إنشاء الحساب بنجاح";

setTimeout(()=>{
window.location.href = "login.html";
},1000);

}
</script>

</body>
</html>
