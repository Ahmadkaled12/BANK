<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب</title>

<style>
body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#020617,#1e293b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background: rgba(255,255,255,0.1);
backdrop-filter: blur(12px);
padding:30px;
border-radius:20px;
width:320px;
color:white;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}
</style>

</head>

<body>

<div class="box">
<h2>إنشاء حساب</h2>

<input type="text" placeholder="الاسم">
<input type="email" placeholder="البريد الإلكتروني">
<input type="password" placeholder="كلمة المرور">

<button>تسجيل</button>
</div>

</body>
</html>
