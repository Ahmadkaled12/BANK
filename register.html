<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:20px;
width:300px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>إنشاء حساب</h2>

<input type="text" placeholder="الاسم">
<input type="email" placeholder="البريد">
<input type="password" placeholder="كلمة المرور">

<button onclick="go()">تسجيل</button>
</div>

<script>
function go(){
window.location.href="dashboard.html";
}
</script>

</body>
</html>
