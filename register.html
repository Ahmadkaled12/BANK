<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:60px">

<h2>إنشاء حساب</h2>

<input id="username" placeholder="اسم المستخدم"><br><br>
<input id="email" placeholder="البريد الإلكتروني"><br><br>
<input id="password" type="password" placeholder="كلمة المرور"><br><br>

<button onclick="register()">إنشاء</button>

<p id="msg"></p>

<script>
function register(){

let users = JSON.parse(localStorage.getItem("users")) || [];

users.push({
username: document.getElementById("username").value,
email: document.getElementById("email").value,
password: document.getElementById("password").value,
balance: 1000
});

localStorage.setItem("users", JSON.stringify(users));

document.getElementById("msg").innerText = "تم إنشاء الحساب";

setTimeout(()=>{
window.location.href = "login.html";
},1000);

}
</script>

</body>
</html>
