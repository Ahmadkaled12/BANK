<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlineNet Bank - تسجيل الدخول</title>

<style>
body {
margin: 0;
font-family: Arial;
background: linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a);
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}

.box {
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
padding: 30px;
border-radius: 20px;
width: 320px;
box-shadow: 0 0 25px rgba(0,0,0,0.4);
color: white;
}

h2 {
text-align: center;
margin-bottom: 20px;
}

input {
width: 100%;
padding: 12px;
margin: 10px 0;
border: none;
border-radius: 10px;
outline: none;
}

button {
width: 100%;
padding: 12px;
border: none;
border-radius: 10px;
background: #3b82f6;
color: white;
font-weight: bold;
cursor: pointer;
transition: 0.3s;
}

button:hover {
background: #2563eb;
transform: scale(1.03);
}

a {
color: #93c5fd;
text-decoration: none;
font-size: 14px;
display: block;
text-align: center;
margin-top: 10px;
}
</style>

</head>

<body>

<div class="box">
<h2>تسجيل الدخول</h2>

<input type="text" placeholder="اسم المستخدم">
<input type="password" placeholder="كلمة المرور">

<button>دخول</button>

<a href="register.html">إنشاء حساب جديد</a>
</div>
<script type="module" src="firebase.js"></script>
  <script>
function login(){
  window.location.href = "dashboard.html";
}
</script>
</body>
</html>
