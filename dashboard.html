<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e1b4b);
color:white;
}

.card{
background:rgba(255,255,255,0.08);
margin:20px;
padding:20px;
border-radius:20px;
}

.balance{
font-size:30px;
color:#22c55e;
font-weight:bold;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
}

.send{background:#3b82f6;color:white;}
.deposit{background:#22c55e;color:white;}
.withdraw{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="card">
<h2>🏦 الحساب البنكي</h2>
<p>الرصيد الحالي</p>
<div class="balance">$ 1,000</div>
</div>

<div class="card">
<button class="deposit">إيداع</button>
<button class="withdraw">سحب</button>
<button class="send">تحويل</button>
</div>

</body>
</html>
