<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:50px">

<h2>🏦 لوحة البنك</h2>

<h3 id="user"></h3>
<h1 id="balance"></h1>

<input id="toUser" placeholder="المستلم"><br><br>
<input id="amount" type="number" placeholder="المبلغ"><br><br>

<button onclick="transfer()">تحويل</button>
<button onclick="logout()">خروج</button>

<p id="msg"></p>

<script>

let currentUser = JSON.parse(localStorage.getItem("currentUser"));
let users = JSON.parse(localStorage.getItem("users")) || [];

if(!currentUser){
window.location.href="login.html";
}

document.getElementById("user").innerText = currentUser.username;
document.getElementById("balance").innerText = currentUser.balance + " $";

function transfer(){

let to = document.getElementById("toUser").value;
let amount = Number(document.getElementById("amount").value);

if(amount > currentUser.balance){
document.getElementById("msg").innerText = "رصيد غير كافي";
return;
}

let receiver = users.find(u => u.username === to);

if(!receiver){
document.getElementById("msg").innerText = "المستخدم غير موجود";
return;
}

users.forEach(u=>{
if(u.username === currentUser.username){
u.balance -= amount;
currentUser.balance -= amount;
}
});

receiver.balance += amount;

localStorage.setItem("users", JSON.stringify(users));
localStorage.setItem("currentUser", JSON.stringify(currentUser));

document.getElementById("balance").innerText = currentUser.balance + " $";

document.getElementById("msg").innerText = "تم التحويل";

}

function logout(){
localStorage.removeItem("currentUser");
window.location.href="login.html";
}
<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#1e3a8a,#0b1220 60%,#000);
color:white;
}

/* خلفية متحركة خفيفة */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background: url("https://www.transparenttextures.com/patterns/cubes.png");
opacity:0.05;
pointer-events:none;
}

/* كارد احترافي */
.card{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.1);
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
max-width:420px;
margin:20px auto;
}

/* أزرار احترافية */
button, a.btn{
display:inline-block;
padding:12px 20px;
border-radius:10px;
border:none;
cursor:pointer;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.primary{
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
}

.success{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
}

.danger{
background:linear-gradient(135deg,#ef4444,#b91c1c);
color:white;
}

button:hover, a.btn:hover{
transform:scale(1.05);
opacity:0.9;
}

/* إدخالات */
input{
width:90%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.1);
color:white;
}

input::placeholder{
color:#cbd5e1;
}

/* عنوان */
h1,h2,h3{
text-shadow:0 2px 10px rgba(0,0,0,0.5);
}

/* Navbar */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(17,24,39,0.6);
backdrop-filter: blur(10px);
position:sticky;
top:0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* صندوق إحصائيات */
.box{
padding:15px;
border-radius:12px;
background:rgba(255,255,255,0.06);
margin:10px 0;
}

/* نصوص صغيرة */
small{
opacity:0.7;
}
</style>
</script>

</body>
</html>
